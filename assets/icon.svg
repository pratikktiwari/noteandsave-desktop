      <stop offset="0%" stop-color="#8B5E34"/>
      <stop offset="100%" stop-color="#694111"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- N&S text -->
  <text x="256" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="700" fill="#FFFDFC" text-anchor="middle" dominant-baseline="middle">N&amp;S</text>
  <!-- Checkmark circle -->
  <circle cx="256" cy="390" r="52" fill="none" stroke="#F7ECE5" stroke-width="8"/>
  <!-- Checkmark -->
